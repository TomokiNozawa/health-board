<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f766e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HealthBoard">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" href="favicon.ico" sizes="48x48">
<title>HealthBoard</title>
<style>
:root{
  --bg:#0b1220; --bg2:#111c33; --card:#16233f; --card2:#1d2d4f;
  --ink:#e8eef7; --sub:#9fb0c9; --line:#27375c;
  --teal:#14b8a6; --teal-d:#0f766e; --amber:#f59e0b; --rose:#fb7185;
  --green:#34d399; --blue:#60a5fa; --violet:#a78bfa;
  --ok:#34d399; --warn:#fbbf24; --bad:#fb7185;
  --r:16px; --tap:46px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:linear-gradient(180deg,#0b1220,#0d1730 40%,#0b1220);
  color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Segoe UI",sans-serif;
  min-height:100vh; padding-bottom:calc(72px + env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased;
}
.hidden{display:none !important}
button{font-family:inherit; cursor:pointer; border:none; color:inherit; touch-action:manipulation; -webkit-user-select:none; user-select:none}  /* 連打時のダブルタップズーム/テキスト選択を防ぐ */
input,select,textarea{font-family:inherit; font-size:16px}

/* ===== Header ===== */
header{
  position:sticky; top:0; z-index:30;
  background:rgba(11,18,32,.82); backdrop-filter:blur(12px);
  padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;
  border-bottom:1px solid var(--line);
  display:flex; align-items:center; justify-content:space-between;
}
.h-title{font-size:18px; font-weight:800; letter-spacing:.5px; display:flex; gap:8px; align-items:center}
.h-title .dot{width:10px;height:10px;border-radius:50%;background:var(--teal);box-shadow:0 0 12px var(--teal)}
.h-acct{font-size:12px; color:var(--sub); background:var(--card); padding:8px 12px; border-radius:20px; border:1px solid var(--line); min-height:36px}
a.h-acct.nozaback{text-decoration:none; display:inline-flex; align-items:center; justify-content:center; min-width:38px; font-size:16px}
a.h-acct.nozaback:active{transform:scale(.92)}

/* ===== Layout ===== */
main{max-width:560px; margin:0 auto; padding:14px 14px 20px}
.view{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
h2.sec{font-size:13px; color:var(--sub); text-transform:uppercase; letter-spacing:1px; margin:18px 4px 8px; font-weight:700}

.card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:16px; margin-bottom:12px}
.card.tap{transition:transform .08s}
.card.tap:active{transform:scale(.985)}
.row{display:flex; align-items:center; gap:12px}
.between{justify-content:space-between}
.grow{flex:1; min-width:0}
.muted{color:var(--sub)}
.tiny{font-size:12px}
.big{font-size:30px; font-weight:800; letter-spacing:.5px}
.mono{font-variant-numeric:tabular-nums; font-feature-settings:"tnum"}

/* ===== Fasting ring ===== */
.fast-wrap{display:flex; flex-direction:column; align-items:center; gap:6px; padding:8px 0 4px}
.ring{position:relative; width:200px; height:200px}
.ring svg{transform:rotate(-90deg)}
.ring .center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px}
.ring .center .t{font-size:38px; font-weight:800; line-height:1}
.ring .center .l{font-size:12px; color:var(--sub)}
.fast-state{font-size:14px; font-weight:700; padding:6px 14px; border-radius:20px; margin-top:4px}
.fast-state.fasting{background:rgba(20,184,166,.16); color:var(--teal)}
.fast-state.eating{background:rgba(245,158,11,.16); color:var(--amber)}
.fast-detail{margin-top:14px; border-top:1px solid var(--line); padding-top:10px}
.fast-detail .fd-row{display:flex; justify-content:space-between; align-items:center; padding:7px 2px; font-size:14px}
.fast-detail .fd-row + .fd-row{border-top:1px solid rgba(39,55,92,.5)}
.fast-detail .fd-row span{color:var(--sub)}
.fast-detail .fd-row b{font-weight:700}
.fast-detail .fd-row b.hl{color:var(--teal)}

/* ===== Stat tiles ===== */
.tiles{display:grid; grid-template-columns:1fr 1fr; gap:12px}
.tile{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:14px}
.tile .lab{font-size:12px; color:var(--sub); display:flex; gap:6px; align-items:center; justify-content:space-between; white-space:nowrap}
.tile .lab span:first-child{overflow:hidden; text-overflow:ellipsis}
.tile .lab .goal{font-size:11px; flex:none; font-variant-numeric:tabular-nums}
.tile .val{font-size:24px; font-weight:800; margin-top:4px; white-space:nowrap}  /* 5桁歩数でも1行固定 */
.tile .val small{font-size:13px; color:var(--sub); font-weight:600}
.bar{height:7px; background:var(--bg2); border-radius:6px; overflow:hidden; margin-top:8px}
.bar > i{display:block; height:100%; border-radius:6px; background:var(--teal); transition:width .4s}

/* ===== Buttons ===== */
.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px;
  min-height:var(--tap); padding:0 18px; border-radius:14px; font-weight:700; font-size:15px;
  background:var(--card2); border:1px solid var(--line); transition:transform .08s,filter .15s}
.btn:active{transform:scale(.96)}
.btn.primary{background:linear-gradient(135deg,var(--teal),var(--teal-d)); border:none; color:#04201c}
.btn.amber{background:linear-gradient(135deg,#fbbf24,#f59e0b); border:none; color:#3a2400}
.btn.ghost{background:transparent}
.btn.block{display:flex; width:100%}
.btn.sm{min-height:38px; padding:0 12px; font-size:13px; border-radius:11px}
.btn-row{display:flex; gap:10px}

/* ===== List items ===== */
.item{display:flex; align-items:center; gap:12px; padding:12px 4px; border-bottom:1px solid var(--line)}
.item:last-child{border-bottom:none}
.item .ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--bg2);flex:none}
.item .meta{flex:1; min-width:0}
.item .meta .nm{font-weight:700; font-size:15px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.item .meta .sb{font-size:12px; color:var(--sub)}
.item .amt{text-align:right; font-weight:700; font-variant-numeric:tabular-nums}
.del{background:transparent; color:var(--sub); font-size:18px; padding:6px 8px; min-width:34px}

/* chips */
.chips{display:flex; flex-wrap:wrap; gap:8px}
.chip{padding:9px 14px; border-radius:20px; background:var(--bg2); border:1px solid var(--line); font-size:14px; font-weight:600; min-height:40px; display:inline-flex; align-items:center; gap:6px}
.chip.on{background:rgba(52,211,153,.18); border-color:var(--green); color:var(--green)}
.chip.warn{background:rgba(245,158,11,.14); border-color:var(--amber); color:var(--amber)}

/* counter */
.counter{display:flex; align-items:center; gap:14px}
.counter button{width:44px;height:44px;border-radius:50%;background:var(--card2);border:1px solid var(--line);font-size:22px;font-weight:700}
.counter button.stp{font-size:15px; font-weight:800}  /* ±5 等、増減量を明示する時は少し小さく */
.counter .n{font-size:26px;font-weight:800;min-width:48px;text-align:center;font-variant-numeric:tabular-nums}

/* ===== Bottom nav ===== */
nav.tabbar{
  position:fixed; bottom:0; left:0; right:0; z-index:40;
  background:rgba(13,23,48,.92); backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
  display:flex; padding:6px 6px calc(6px + env(safe-area-inset-bottom));
}
nav.tabbar button{flex:1; background:transparent; display:flex; flex-direction:column; align-items:center; gap:3px; padding:7px 0; color:var(--sub); font-size:10.5px; font-weight:700; min-height:56px}
nav.tabbar button .ic{font-size:21px}
nav.tabbar button.on{color:var(--teal)}

/* FAB */
.fab{position:fixed; right:18px; bottom:calc(78px + env(safe-area-inset-bottom)); z-index:45;
  width:58px;height:58px;border-radius:50%; background:linear-gradient(135deg,var(--teal),var(--teal-d));
  color:#04201c; font-size:30px; font-weight:300; box-shadow:0 8px 24px rgba(20,184,166,.45);
  display:flex; align-items:center; justify-content:center}
.fab:active{transform:scale(.92)}

/* ===== Modal / sheet ===== */
.scrim{position:fixed; inset:0; z-index:60; background:rgba(0,0,0,.55); backdrop-filter:blur(2px);
  display:flex; align-items:flex-end; justify-content:center; animation:fade .2s}
.sheet{width:100%; max-width:560px; background:var(--bg2); border-top-left-radius:22px; border-top-right-radius:22px;
  border:1px solid var(--line); border-bottom:none; max-height:92vh; overflow-y:auto; padding:8px 18px calc(20px + env(safe-area-inset-bottom));
  animation:up .26s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.grip{width:40px;height:4px;background:var(--line);border-radius:3px;margin:8px auto 12px}
.sheet h3{margin:4px 0 14px; font-size:18px}
.field{margin-bottom:14px}
.field label{display:block; font-size:13px; color:var(--sub); margin-bottom:6px; font-weight:600}
.field input,.field select,.field textarea{width:100%; padding:13px 14px; border-radius:12px; background:var(--card); border:1px solid var(--line); color:var(--ink)}
.field textarea{min-height:64px; resize:vertical}
.two{display:grid; grid-template-columns:1fr 1fr; gap:12px}
.three{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px}

/* segmented */
.seg{display:flex; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:4px; gap:4px}
.seg button{flex:1; min-height:40px; border-radius:9px; background:transparent; font-weight:700; font-size:14px; color:var(--sub)}
.seg button.on{background:var(--teal-d); color:#fff}

/* toast */
#toast{position:fixed; bottom:calc(84px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
  background:#04201c; border:1px solid var(--teal); color:var(--teal); padding:12px 20px; border-radius:14px;
  font-weight:700; z-index:80; opacity:0; transition:opacity .25s, transform .25s; pointer-events:none; max-width:88vw; text-align:center}
#toast.show{opacity:1; transform:translateX(-50%) translateY(-6px)}

/* login */
.login-wrap{max-width:380px; margin:14vh auto 0; padding:0 22px; text-align:center}
.login-wrap .logo{font-size:42px; margin-bottom:6px}
.login-wrap h1{font-size:24px; margin:0 0 4px}
.login-wrap p{color:var(--sub); margin:0 0 26px; font-size:14px}

/* mini bar chart */
.chartbox{display:flex; align-items:flex-end; gap:6px; height:140px; padding-top:8px; position:relative}
.chartbox.dense{gap:2px}  /* 30日表示: 細ギャップ+日付ラベル間引きで画面内に収める */
.chartbox .col{min-width:0}
.chartbox .goal-line{position:absolute; left:0; right:0; border-top:1.5px dashed var(--amber); opacity:.65; pointer-events:none}
/* 達成カレンダー (GitHub草スタイル) */
.fcal{display:grid; grid-template-columns:repeat(7,1fr); gap:4px}
.fcal .c{aspect-ratio:1; border-radius:7px; background:var(--bg2); display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--sub); font-variant-numeric:tabular-nums}
.fcal .c.ok{background:rgba(52,211,153,.32); color:var(--green); font-weight:700}
.fcal .c.ng{background:rgba(251,113,133,.20); color:var(--rose)}
.fcal .c.half{background:rgba(245,158,11,.28); color:var(--amber); font-weight:700}
.fcal .c.h{aspect-ratio:auto; background:transparent; font-size:9px; padding:2px 0}
.chartbox .col{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end}
.chartbox .col .bb{width:100%; max-width:26px; border-radius:6px 6px 0 0; background:linear-gradient(180deg,var(--teal),var(--teal-d)); min-height:3px; transition:height .4s}
.chartbox .col .bb.amber{background:linear-gradient(180deg,#fbbf24,#f59e0b)}
.chartbox .col .bb.blue{background:linear-gradient(180deg,#60a5fa,#3b82f6)}
.chartbox .col .lab{font-size:10px; color:var(--sub); min-height:12px; line-height:12px}  /* 空ラベルでも高さ確保 (棒のベースラインと目標ラインの整合) */
.chartbox .col .vlab{font-size:9.5px; font-weight:700; color:var(--ink); font-variant-numeric:tabular-nums; line-height:1.1; min-height:11px; text-align:center; white-space:nowrap}
.legend{display:flex; gap:14px; font-size:12px; color:var(--sub); margin-top:10px; flex-wrap:wrap}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}

.empty{text-align:center; color:var(--sub); padding:26px 10px; font-size:14px}
.streak{display:inline-flex; align-items:center; gap:6px; background:rgba(245,158,11,.14); color:var(--amber); padding:6px 12px; border-radius:18px; font-weight:800; font-size:14px}
.date-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px}
.date-nav button{width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--line);font-size:18px}
.date-nav .d{font-weight:800; font-size:16px; cursor:pointer; padding:8px 14px}  /* タップで今日に戻る */

/* food master chips */
.food-chips{display:flex; flex-direction:column; gap:7px; max-height:230px; overflow-y:auto}
.food-chip{display:flex; align-items:center; gap:10px; width:100%; text-align:left; padding:11px 12px; border-radius:12px; background:var(--card); border:1px solid var(--line); min-height:46px}
.food-chip:active{transform:scale(.985)}
.food-chip .fc-name{flex:1; font-weight:700; font-size:15px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.food-chip .fc-kcal{font-size:13px; color:var(--amber); font-weight:700; font-variant-numeric:tabular-nums; flex:none}
.food-chip .fc-pin{flex:none; width:24px; text-align:center; font-size:15px}
.food-chip .fc-del{flex:none; width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--sub); font-size:18px; background:var(--bg2)}
.or-sep{display:flex; align-items:center; gap:10px; margin:4px 0 14px; color:var(--sub); font-size:12px}
.or-sep::before,.or-sep::after{content:""; flex:1; height:1px; background:var(--line)}

/* photo AI bits */
.ai-drop{border:1.5px dashed var(--line); border-radius:14px; padding:18px; text-align:center; background:var(--card)}
.ai-preview{width:100%; max-height:200px; object-fit:contain; border-radius:12px; margin-bottom:10px; background:#000}
.ai-spin{display:inline-block;width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== Responsive: small phones (iPhone SE, ~360px以下) ===== */
@media (max-width:360px){
  .ring{width:168px;height:168px}
  .ring svg{width:168px;height:168px}
  .ring .center .t{font-size:30px}
  .tile .val{font-size:20px}
  .big{font-size:26px}
  main{padding:12px 10px 20px}
  .three{gap:7px}
  nav.tabbar button{font-size:9.5px}
  .btn{padding:0 12px; font-size:14px}
}
@media (max-width:330px){
  .tiles{grid-template-columns:1fr}  /* 極小幅は1列に */
}

/* ===== Responsive: landscape (横向き) ===== */
@media (orientation:landscape) and (max-height:500px){
  .ring{width:140px;height:140px}
  .ring svg{width:140px;height:140px}
  .ring .center .t{font-size:26px}
  .fast-wrap{flex-direction:row; flex-wrap:wrap; justify-content:center; gap:14px}
  .sheet{max-height:96vh}
  header{padding-top:calc(env(safe-area-inset-top) + 6px)}
}

/* ===== Responsive: tablet / PC (561px以上) ===== */
@media (min-width:600px){
  .tiles{grid-template-columns:1fr 1fr 1fr 1fr}  /* 横並び4列 */
  main{padding-top:18px}
}

/* ハイコントラスト/ダーク既定だが、ユーザのreduced-motion尊重 */
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001s !important; transition-duration:.001s !important}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView" class="hidden">
  <div class="login-wrap">
    <div class="logo">🌱</div>
    <h1>HealthBoard</h1>
    <p>あなた専用の健康管理</p>
    <div class="field"><input id="loginEmail" type="email" placeholder="メールアドレス" autocomplete="username"></div>
    <div class="field"><input id="loginPass" type="password" placeholder="パスワード" autocomplete="current-password"></div>
    <div id="loginErr" class="tiny" style="color:var(--bad);min-height:18px;margin-bottom:8px"></div>
    <button id="loginBtn" class="btn primary block" style="margin-bottom:10px">ログイン</button>
    <button id="signupBtn" class="btn ghost block">新規アカウント作成</button>
    <button id="resetBtn" class="btn ghost block" style="margin-top:6px;font-size:13px;min-height:38px;color:var(--sub)">パスワードを忘れた場合(再設定メール)</button>
  </div>
</div>

<!-- APP -->
<div id="appView" class="hidden">
  <header>
    <div class="h-title"><span class="dot"></span>HealthBoard</div>
    <div class="row" style="gap:8px">
      <a class="h-acct nozaback" href="https://tomokinozawa.github.io/dashboard/" title="NozaBoardへ戻る">🏠</a>
      <button id="acctBtn" class="h-acct">…</button>
    </div>
  </header>

  <main>
    <div class="date-nav card" style="padding:8px 10px">
      <button id="prevDay">‹</button>
      <div class="d" id="curDate">今日</div>
      <button id="nextDay">›</button>
    </div>
    <div id="viewHome" class="view"></div>
    <div id="viewMeals" class="view hidden"></div>
    <div id="viewWorkout" class="view hidden"></div>
    <div id="viewBody" class="view hidden"></div>
    <div id="viewStats" class="view hidden"></div>
  </main>

  <button id="fab" class="fab">+</button>

  <nav class="tabbar">
    <button data-tab="Home" class="on"><span class="ic">🏠</span>ホーム</button>
    <button data-tab="Meals"><span class="ic">🍽️</span>食事</button>
    <button data-tab="Workout"><span class="ic">💪</span>運動</button>
    <button data-tab="Body"><span class="ic">⚖️</span>からだ</button>
    <button data-tab="Stats"><span class="ic">📊</span>記録</button>
  </nav>
</div>

<div id="modalRoot"></div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="app.js?v=0.5.20"></script>
</body>
</html>
